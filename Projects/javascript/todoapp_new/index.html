<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App 2</title>
</head>
<style>
    *{
        margin : 0;
        padding: 0;
        box-sizing: border-box;
    }
    header{
        text-align: center;
    }
    .container{
        text-align: center;
        margin-top: 60px;
    }
    .card{
        margin-top: 20px;
        display: flex;
        justify-content: center;
    }
    .list{
        display:flex;
        flex-direction: column;
        gap: 5px;
        overflow-y:auto;
        height: 70vh;
        width: 40vw;
        word-wrap: break-word;
        padding-top: 5px;
        background-color: rgb(241, 241, 241);
        box-shadow: 2px 2px 1px grey;
        
    }
    #input{
        font-size: larger;
        border: none;
        background-color: rgb(221, 221, 221);
        padding:8px;
    }
    .add{
        font-size: large;
        border:none;
         background-color: rgb(221, 221, 221);
         padding:8px;
    }
    
</style>
<body>
    <header> 
        <h1>To Do List</h1>
    </header>
    <div class="container">
        <input type="text" id="input" placeholder="Add Tasks...">
        <button class="add">Add</button>
        <div class="card">
            <ul class="list">
            </ul>
        </div>
    </div>
</body>
<script>
    let input = document.querySelector("#input");
    let button = document.querySelector("button");
    let list = document.querySelector(".list");
    let tasks=[];


    function storeinLocal(){
        localStorage.setItem("name", JSON.stringify(tasks));
    }

    function showtasks(taskObj){
        let box = document.createElement("input");
        box.type = "checkbox";
        let span = document.createElement("span");
        span.textContent = taskObj.text;
        let del = document.createElement("button");
        del.innerText="Delete";
        del.style.width = "fit-content";
        del.style.height = "fit-content";
        let li = document.createElement("li");

        let div = document.createElement("div");
        div.style.display="flex";
        div.style.justifyContent="space-between";
        div.style.paddingLeft="15px";
        div.style.paddingRight="15px";
        div.style.fontSize="12px";
        let a = document.createElement("div");
        a.append(taskObj.date);
        div.append(a, taskObj.time);
        
        //basically once I reload (if i get the completed task)
        box.checked = taskObj.complete;
        li.style.display="flex";
        li.style.justifyContent="space-around";
        li.style.alignItems="center";
        li.style.padding= "5px";
        li.style.fontSize="larger";
        li.append(box,span,del);
        let node = document.createElement("div");
        node.append(div,li);
        node.style.border="solid black 1px";
        list.append(node);

        if(taskObj.complete){
                span.style.textDecoration="line-through";
                node.style.backgroundColor="black";
                node.style.color="white";
        }   

//check-box toggle 
box.addEventListener("change",()=>{
            taskObj.complete = box.checked;
            //simple styling nothing logical
            if(box.checked){
                span.style.textDecoration="line-through";
                node.style.backgroundColor="black";
                node.style.color="white";
            }
            else{
                span.style.textDecoration="none";
                node.style.backgroundColor="";
                node.style.color="black";
            }
            storeinLocal();

});
//delete function 
        del.addEventListener("click",()=>{
            node.remove();
            tasks=tasks.filter( task => task!== taskObj);
            storeinLocal();
        });


function expire() {
    const now = Date.now();
    const expireTime = 15000; // Expires in 15sec

    tasks = tasks.filter(task => {
        return (now - task.createdAt) < expireTime; 
    });

    storeinLocal();
    list.innerHTML = "";
    tasks.forEach(t => showtasks(t)); // shows tasks which are in tasks arr
}

setInterval(expire,5000);

}


// add button eventlistener
 button.addEventListener('click',()=>{
        if(input.value==""){
            alert("write some tasks..");
        }
        else{
            let a = new Date();
            const taskobj = {
            text : input.value,
            complete: false,
            date : a.toLocaleDateString(),
            time : a.toLocaleTimeString(),
            createdAt: Date.now(),
            }
            showtasks(taskobj);
            tasks.push(taskobj);
            storeinLocal();
            input.value=""; 
        }
}); 

//code for enter key
input.addEventListener("keydown" ,(e)=>{
    if(e.key=="Enter"){
        button.click();
    }
});

//code after reload
window.addEventListener("DOMContentLoaded", reload );
function reload(){
    let items = localStorage.getItem("name");
    if(items){
        tasks = JSON.parse(items);
        tasks.forEach( t => showtasks(t));
    }
}

</script>
</html>
