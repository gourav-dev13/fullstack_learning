<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<style>
    body{
        display:flex;
        justify-content: center;
    }
    .container{
        height: fit-content;
        width:290px;
        text-align: center;
        background-color:skyblue;
    }
    .input{
        width: 100%;
        height:35px;
        text-align: center;

    }
    input{
        width:95%;
        height:100%;
        font-size: large;
        text-align: right;
    }
    .buttons{
        margin:10px;
    }
    button{
        height:60px;
        width:60px;
        font-size:larger;
        border-radius: 10px;
    }
</style>
<body>
    <div class="container">
        <div class="input"> <input> </div>
        <div class="buttons">
            <button>C</button>
            <button>!</button>
            <button>%</button>
            <button>/</button>
        </div>
        <div class="buttons">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>*</button>
        </div>
        <div class="buttons">
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>-</button>
        </div>
        <div class="buttons">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>+</button>
        </div>
        <div class="buttons">
            <button>0</button>
            <button>.</button>
            <button>*</button>
            <button>=</button>
        </div>
</body>
<script src="function.js"></script>
</html>
