<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  
  <!-- Sidebar -->
  <aside class="sidebar">
    <h2 class="logo">MyDash</h2>
    <ul>
      <li>🏠 Dashboard</li>
      <li>📊 Analytics</li>
      <li>📁 Projects</li>
      <li>⚙️ Settings</li>
      <li>🚪 Logout</li>
    </ul>
  </aside>

  <!-- Main Content -->
  <main class="main">
    
    <!-- Topbar -->
    <header class="topbar">
      <h1>Dashboard</h1>
      <input type="text" placeholder="Search...">
    </header>

    <!-- Cards -->
    <section class="cards">
      <div class="card">Users<br><strong>1,245</strong></div>
      <div class="card">Sales<br><strong>$8,430</strong></div>
      <div class="card">Orders<br><strong>320</strong></div>
      <div class="card">Growth<br><strong>12%</strong></div>
    </section>

    <!-- Table -->
    <section class="table-section">
      <h2>Recent Activity</h2>
      <table>
        <tr>
          <th>Name</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
        <tr>
          <td>John</td>
          <td>Completed</td>
          <td>24 Apr</td>
        </tr>
        <tr>
          <td>Sarah</td>
          <td>Pending</td>
          <td>23 Apr</td>
        </tr>
      </table>
    </section>

  </main>

</div>
<script src="app.js"></script>
</body>

</html>
